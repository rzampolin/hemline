# Litestream — continuous SQLite replication to S3-compatible object storage
# (Fly Tigris in production; docs/decisions-deploy.md §7). Baked into the image
# at /etc/litestream.yml; docker/start.mjs runs `litestream replicate` as a
# third supervised child ONLY when the four env vars below are present, so
# local docker runs without secrets keep working identically.
#
# Env (Tigris's standard names — `fly storage create` sets all of them as
# app secrets; litestream expands ${VAR} in this file at load time and reads
# AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY from the environment natively):
#   BUCKET_NAME             bucket created by `fly storage create`
#   AWS_ACCESS_KEY_ID       tid_...
#   AWS_SECRET_ACCESS_KEY   tsec_...
#   AWS_ENDPOINT_URL_S3     https://fly.storage.tigris.dev
#
# Litestream v0.5 auto-detects the Tigris endpoint (signed payloads, no MD5)
# and defaults to path-style URLs whenever an explicit endpoint is set — the
# same config therefore works against a local MinIO (the verification rig).
#
# Restore runbook: DEPLOY.md "Backups & restore".

dbs:
  - path: /data/hemline.db
    replica:
      type: s3
      bucket: ${BUCKET_NAME}
      path: hemline.db
      endpoint: ${AWS_ENDPOINT_URL_S3}
      region: auto
      access-key-id: ${AWS_ACCESS_KEY_ID}
      secret-access-key: ${AWS_SECRET_ACCESS_KEY}
      # 10s cap on the data-loss window; writes are bursty (daily crawls,
      # occasional user actions) so the steady-state PUT volume stays tiny.
      sync-interval: 10s

# Full-snapshot cadence + how far back point-in-time restore reaches.
# 6h × 72h ≈ 12 snapshots of a ~12MB db (~150MB in the bucket, ~free on
# Tigris); anything older is covered by Fly's daily volume snapshots (5 kept).
snapshot:
  interval: 6h
  retention: 72h
